# ============================================================
# Mortaza Hassani — Personal Academic Website
# ============================================================

# --- Basic Site Settings ---
locale                   : "en-US"
title                    : "Mortaza Hassani"
title_separator          : "—"
name                     : "Mortaza Hassani"
description              : "Ph.D. Researcher in Hardware Security & Embedded Systems | ECE, UMass Amherst"
url                      : "https://MortazaHassani.github.io"
baseurl                  : ""
repository               : "MortazaHassani/MortazaHassani.github.io"

# --- Author ---
author:
  name        : "Mortaza Hassani"
  pronouns    : "He/Him"
  title       : "Ph.D. Researcher, ECE"
  affiliation : "University of Massachusetts Amherst"
  location    : "Amherst, MA, USA"
  bio         : "Ph.D. researcher at UMass Amherst working on hardware security, side-channel analysis, and secure SoC design for implantable medical devices."
  avatar      : "/images/profile.jpg"
  github      : "MortazaHassani"
  linkedin    : "MortazaHassani"
  youtube     : "MortazaHassani"
  google_scholar : ""
  orcid       : ""
  arxiv       : ""

# --- Collections ---
collections:
  news:
    output: true
    permalink: /news/:title/
  publications:
    output: true
    permalink: /publications/:title/
  projects:
    output: true
    permalink: /projects/:title/
  teaching:
    output: true
    permalink: /teaching/:title/
  achievements:
    output: true
    permalink: /achievements/:title/

# --- Defaults ---
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
  - scope:
      path: ""
      type: pages
    values:
      layout: page
  - scope:
      path: ""
      type: publications
    values:
      layout: publication
  - scope:
      path: ""
      type: news
    values:
      layout: news-item
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: teaching
    values:
      layout: page
  - scope:
      path: ""
      type: achievements
    values:
      layout: page

# --- Reading Files ---
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .sass-cache
  - CHANGELOG
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - LICENSE
  - node_modules
  - package.json
  - README
  - vendor
  - talkmap
  - markdown_generator
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# --- Conversion ---
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
future: true

# --- Markdown Processing ---
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# --- Sass/SCSS ---
sass:
  sass_dir: _sass
  style: compressed

# --- Outputting ---
permalink: /:categories/:title/
timezone: America/New_York

# --- Plugins ---
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

whitelist:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

# --- SEO ---
twitter:
  username:
facebook:
  username:
og_image: "/images/profile.jpg"
social:
  type: Person
  name: "Mortaza Hassani"
  links:
    - "https://github.com/MortazaHassani"
    - "https://linkedin.com/in/MortazaHassani"

# --- Feed ---
atom_feed:
  hide: false
